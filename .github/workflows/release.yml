name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked
      - run: Compress-Archive target/release/iron_renamer.exe iron_renamer-windows-x86_64.zip
      - run: gh release create $env:GITHUB_REF_NAME iron_renamer-windows-x86_64.zip --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
