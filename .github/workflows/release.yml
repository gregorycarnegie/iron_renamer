name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            pack: |
              Compress-Archive target/release/iron_renamer.exe iron_renamer-windows-x86_64.zip
              pwsh -File packaging/windows/package.ps1 -OutputPath iron_renamer-windows-x86_64.msix
          - os: windows-11-arm
            pack: |
              Compress-Archive target/release/iron_renamer.exe iron_renamer-windows-aarch64.zip
              pwsh -File packaging/windows/package.ps1 -OutputPath iron_renamer-windows-aarch64.msix -Architecture arm64
          - os: ubuntu-latest
            pack: |
              mkdir dist
              cp target/release/iron_renamer packaging/iron_renamer.desktop packaging/install.sh dist/
              cp ui/icon.png dist/icon.png
              tar czf iron_renamer-linux-x86_64.tar.gz -C dist .
          - os: ubuntu-24.04-arm
            pack: |
              mkdir dist
              cp target/release/iron_renamer packaging/iron_renamer.desktop packaging/install.sh dist/
              cp ui/icon.png dist/icon.png
              tar czf iron_renamer-linux-aarch64.tar.gz -C dist .
          - os: macos-latest
            pack: |
              sh packaging/macos_app.sh "$GITHUB_REF_NAME"
              tar czf iron_renamer-macos-aarch64.tar.gz -C dist "Iron Renamer.app"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev
      - run: cargo build --release --locked
      - run: ${{ matrix.pack }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: iron_renamer-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - run: gh release create "$GITHUB_REF_NAME" iron_renamer-* --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
